services:
  - type: web
    name: disease-prediction-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: ARTIFACT_DIR
        value: artifacts
      - key: ALLOWED_ORIGINS
        sync: false
